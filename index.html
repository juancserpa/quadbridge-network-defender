// ========================================================
// AUDIO ENGINE
// ========================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() { if (!audioCtx) { audioCtx = new AudioCtx(); } if (audioCtx.state === "suspended") audioCtx.resume(); }

function playTone(freq, duration, type = 'square', vol = 0.06) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.value = vol;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

function sfxShoot() { playTone(700, 0.07); playTone(550, 0.05, 'square', 0.04); }
function sfxHit() { playTone(200, 0.12, 'sawtooth', 0.07); playTone(120, 0.15); }
function sfxPickup() { playTone(523, 0.06); setTimeout(()=>playTone(784, 0.06),50); setTimeout(()=>playTone(1047, 0.08),100); }
function sfxExplosion() { playTone(80, 0.25, 'sawtooth', 0.09); playTone(50, 0.35, 'square', 0.07); }
function sfxWave() { playTone(392, 0.08); setTimeout(()=>playTone(523, 0.08),80); setTimeout(()=>playTone(784, 0.12),160); }
function sfxBossAlert() { for(let i=0;i<3;i++) setTimeout(()=>{playTone(220,0.1,'sawtooth',0.08);playTone(330,0.1,'square',0.06);}, i*200); }

// ========================================================
// SPRITE FACTORY
// ========================================================
function createSprite(w, h, fn) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const x = c.getContext('2d');
  x.imageSmoothingEnabled = true;
  fn(x, w, h);
  return c;
}

  x.fillStyle = '#0b4d66';
  x.beginPath();
  x.moveTo(cx, 1); x.lineTo(cx+14, 30); x.lineTo(cx+6, 34); x.lineTo(cx, 28);
  x.lineTo(cx-6, 34); x.lineTo(cx-14, 30); x.closePath(); x.fill();
  // Main teal body
  const bg = x.createLinearGradient(cx, 2, cx, 32);
  bg.addColorStop(0, '#1db8d6'); bg.addColorStop(0.5, QB.teal); bg.addColorStop(1, '#0b5a75');
  x.fillStyle = bg;
  x.beginPath();
  x.moveTo(cx, 2); x.lineTo(cx+12, 28); x.lineTo(cx+5, 32); x.lineTo(cx, 26);
  x.lineTo(cx-5, 32); x.lineTo(cx-12, 28); x.closePath(); x.fill();
  // Center highlight panel
  const hg = x.createLinearGradient(cx, 4, cx, 22);
  hg.addColorStop(0, '#5cddf5'); hg.addColorStop(1, 'rgba(92,221,245,0.1)');
  x.fillStyle = hg;
  x.beginPath();
  x.moveTo(cx, 4); x.lineTo(cx+6, 18); x.lineTo(cx, 22); x.lineTo(cx-6, 18); x.closePath(); x.fill();
  // Wing accents (red)
  x.fillStyle = QB.red;
  x.beginPath(); x.moveTo(cx-12, 28); x.lineTo(cx-16, 26); x.lineTo(cx-10, 22); x.closePath(); x.fill();
  x.beginPath(); x.moveTo(cx+12, 28); x.lineTo(cx+16, 26); x.lineTo(cx+10, 22); x.closePath(); x.fill();

  x.fillStyle = '#aaeeff';

  x.beginPath(); x.arc(cx, 11.5, 1.5, 0, Math.PI*2); x.fill();

  x.fillStyle = '#2af0ff';

// ========================================================
// GAME STATE
// ========================================================
const STATES = { TITLE: 0, SELECT: 1, PLAYING: 2, GAMEOVER: 3, BOSS: 4 };
let state = STATES.TITLE;
let selectedChar = 0;
let selectCooldown = 0;
let score = 0;
let highScore = parseInt(localStorage.getItem('qb_hs2') || '0');
let wave = 0;
let waveTimer = 0;
let shakeTimer = 0;
let shakeIntensity = 0;
let frameCount = 0;
let gameTime = 0;
let titlePulse = 0;
let currentTagline = 0;
let taglineTimer = 0;
let bossNameDisplay = '';
let bossNameTimer = 0;

// Client names for "clients saved" counter
const CLIENTS = ['KRAFT HEINZ', 'GOODFOOD', 'LOGISTEC', 'SUNRISE HOTELS', 'MAJOR ENTERPRISE', 'GLOBAL RETAILER'];
let clientsSaved = 0;

let player = {
  x: GW/2 - 18, y: GH - 48,
  w: 36, h: 36,
  speed: 3,
  lives: 3,
  fireRate: 11,
  fireCooldown: 0,
  powerLevel: 1,
  invincible: 0,
  shieldActive: false,
  shieldTimer: 0,
};

let bullets = [], enemyBullets = [], enemies = [], powerups = [];
let particles = [], explosions = [], floatTexts = [];

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (state === STATES.TITLE && (e.code === 'Space' || e.code === 'Enter')) { initAudio(); MUSIC.start('title'); prevMusicState = 'title'; state = STATES.SELECT; selectCooldown = 15; }
  if (state === STATES.SELECT && selectCooldown <= 0) {
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') { selectedChar = (selectedChar - 1 + TEAM_DATA.length) % TEAM_DATA.length; sfxPickup(); selectCooldown = 8; }
    if (e.code === 'ArrowRight' || e.code === 'KeyD') { selectedChar = (selectedChar + 1) % TEAM_DATA.length; sfxPickup(); selectCooldown = 8; }
    if (e.code === 'Space' || e.code === 'Enter') { startGame(); MUSIC.start('gameplay'); prevMusicState = 'gameplay'; }
  }
  if (state === STATES.GAMEOVER && (e.code === 'Space' || e.code === 'Enter')) { state = STATES.TITLE; if (audioCtx) { MUSIC.start('title'); prevMusicState = 'title'; } }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ========================================================
function spawnParticles(x, y, color, count, speed = 2) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, s = Math.random()*speed+0.5;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,

}
function spawnExplosion(x, y, size = 1) {

  spawnParticles(x, y, '#ff6622', 8*size, 2*size); spawnParticles(x, y, '#ffffff', 3*size, 1*size);
}
function spawnFloatText(x, y, text, color = '#fff') {

}

// ========================================================
// ENEMIES
// ========================================================
const BOSS_NAMES = {
  ransomware: 'RANSOMWARE ALPHA',
  ddos: 'DDoS STORM',
};

function spawnEnemy(type, x, y) {
  const defs = {
    virus:      { sprite: virusSprite, w: 28, h: 28, hp: 1, speed: 0.9, score: 100, pattern: 'zigzag' },
    malware:    { sprite: malwareSprite, w: 32, h: 20, hp: 2, speed: 0.7, score: 200, pattern: 'sine' },
    phishing:   { sprite: phishingSprite, w: 26, h: 20, hp: 2, speed: 1.1, score: 250, pattern: 'swoop' },
    ransomware: { sprite: ransomwareSprite, w: 48, h: 48, hp: 35+wave*5, speed: 0.3, score: 3000, pattern: 'boss' },
    ddos:       { sprite: ddosSprite, w: 52, h: 42, hp: 50+wave*5, speed: 0.25, score: 4000, pattern: 'boss' },
  };
  const d = defs[type];
  enemies.push({
    x: x ?? Math.random()*(GW - d.w), y: y ?? -d.h,
    w: d.w, h: d.h, vx: 0, vy: d.speed,
    hp: d.hp, maxHp: d.hp,
    type, sprite: d.sprite, score: d.score, pattern: d.pattern,
    timer: 0, shootTimer: Math.random()*60, phase: Math.random()*Math.PI*2,
  });
}

function spawnWave() {
  wave++;
  waveTimer = 180;
  sfxWave();

  if (wave % 5 === 0) {
    state = STATES.BOSS;
    const bossType = wave % 10 === 0 ? 'ddos' : 'ransomware';
    spawnEnemy(bossType, GW/2 - (bossType === 'ddos' ? 20 : 18), -50);
    bossNameDisplay = BOSS_NAMES[bossType];
    bossNameTimer = 120;
    sfxBossAlert();
    return;
  }

  const count = Math.min(4 + wave, 14);
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (state === STATES.PLAYING || state === STATES.BOSS) {
        const r = Math.random();
        const type = r < 0.2 + wave * 0.01 ? 'phishing' : r < 0.45 + wave * 0.015 ? 'malware' : 'virus';
        spawnEnemy(type, (GW/(count+1))*(i+1) - 8, -16 - Math.random()*50);
      }
    }, i * 250);
  }
}

function spawnPowerup(x, y) {
  const types = ['managed', 'professional', 'acquisition'];
  const type = types[Math.floor(Math.random() * types.length)];
  const sprites = { managed: managedSprite, professional: proSprite, acquisition: techSprite };
  powerups.push({ x, y, w: 22, h: 22, vy: 0.7, type, sprite: sprites[type], glow: 0 });
}

// ========================================================
// GAME LOGIC
// ========================================================
function startGame() {
  state = STATES.PLAYING;
  score = 0; wave = 0; gameTime = 0; clientsSaved = 0;
  player.x = GW/2 - 18; player.y = GH - 52;
  player.lives = 3; player.powerLevel = 1; player.invincible = 0;
  player.shieldActive = false; player.shieldTimer = 0; player.fireRate = 11;
  player.scoreMultiplier = 1;
  bullets = []; enemyBullets = []; enemies = []; powerups = [];
  particles = []; explosions = []; floatTexts = [];
  waveTimer = 80;
  // Apply character ability
  const charAbility = TEAM_DATA[selectedChar].ability.effect;
  if (charAbility === 'scoreX2') player.scoreMultiplier = 2;
  if (charAbility === 'extraLife') player.lives = 4;
  if (charAbility === 'rapidFire') player.fireRate = 5;
  if (charAbility === 'longShield') { player.shieldActive = true; player.shieldTimer = 600; }
}

function update() {
  frameCount++;
  taglineTimer++;
  if (taglineTimer > 240) { taglineTimer = 0; currentTagline = (currentTagline + 1) % TAGLINES.length; }

  if (selectCooldown > 0) selectCooldown--;
  if (state === STATES.TITLE) { titlePulse += 0.04; updateBG(); return; }
  if (state === STATES.SELECT) { titlePulse += 0.04; updateBG(); return; }
  if (state === STATES.GAMEOVER) { updateBG(); updateParticles(); return; }

  gameTime++;
  if (shakeTimer > 0) shakeTimer--;
  if (bossNameTimer > 0) bossNameTimer--;

  updateBG();

  // Wave spawning
  if (enemies.length === 0 && waveTimer > 0) { waveTimer--; if (waveTimer <= 0) spawnWave(); }

  // Player
  const spd = player.speed;
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= spd;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += spd;
  if (keys['ArrowUp'] || keys['KeyW']) player.y -= spd;
  if (keys['ArrowDown'] || keys['KeyS']) player.y += spd;
  player.x = Math.max(0, Math.min(GW - player.w, player.x));
  player.y = Math.max(GH * 0.25, Math.min(GH - player.h - 6, player.y));

  if (player.fireCooldown > 0) player.fireCooldown--;
  if ((keys['Space'] || keys['KeyZ']) && player.fireCooldown <= 0) {
    sfxShoot();
    player.fireCooldown = player.fireRate;
    const cx = player.x + player.w/2, cy = player.y;
    bullets.push({x: cx-4, y: cy-6, vy: -5.5, vx: 0});
    if (player.powerLevel >= 2) {
      bullets.push({x: cx-12, y: cy, vy: -5.5, vx: -0.5});
      bullets.push({x: cx+8, y: cy, vy: -5.5, vx: 0.5});
    }
    if (player.powerLevel >= 3) {
      bullets.push({x: cx-16, y: cy+4, vy: -4.5, vx: -1});
      bullets.push({x: cx+12, y: cy+4, vy: -4.5, vx: 1});
    }
  }

  if (player.invincible > 0) player.invincible--;
  if (player.shieldActive) { player.shieldTimer--; if (player.shieldTimer <= 0) player.shieldActive = false; }

  // Bullets
  bullets = bullets.filter(b => { b.x += b.vx; b.y += b.vy; return b.y > -10 && b.x > -10 && b.x < GW+10; });

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => {
    b.x += b.vx; b.y += b.vy;
    if (player.invincible <= 0 && rr(b,8,8, player,player.w,player.h)) {
      if (player.shieldActive) { player.shieldActive = false; spawnParticles(player.x+11,player.y+11,QB.tealLt,8); return false; }
      hitPlayer(); return false;
    }
    return b.y < GH+10 && b.y > -10 && b.x > -10 && b.x < GW+10;
  });

  // Enemies
  enemies = enemies.filter(enemy => {
    enemy.timer++; enemy.shootTimer--;

    // Movement (CEO ability: slowAll)
    const spdMod = TEAM_DATA[selectedChar].ability.effect === 'slowAll' ? 0.6 : 1;
    if (enemy.pattern === 'zigzag') {
      enemy.vy = 0.8 + wave*0.04;
      enemy.vx = Math.sin(enemy.timer*0.05 + enemy.phase)*1.5;
    } else if (enemy.pattern === 'sine') {
      enemy.vy = 0.6 + wave*0.03;
      enemy.vx = Math.cos(enemy.timer*0.03 + enemy.phase)*2;
    } else if (enemy.pattern === 'swoop') {
      enemy.vy = 0.7 + wave*0.03 + Math.sin(enemy.timer*0.04)*0.5;
      enemy.vx = Math.sin(enemy.timer*0.06 + enemy.phase)*2.5;
    } else if (enemy.pattern === 'boss') {
      if (enemy.y < 20) { enemy.vy = 0.5; }
      else { enemy.vy = 0; enemy.vx = Math.sin(enemy.timer*0.015)*2; }
      if (enemy.shootTimer <= 0) {
        enemy.shootTimer = Math.max(15, 50 - wave*2);
        const dx = (player.x+11)-(enemy.x+enemy.w/2), dy = (player.y+11)-(enemy.y+enemy.h);
        const dist = Math.sqrt(dx*dx+dy*dy) || 1;
        enemyBullets.push({x:enemy.x+enemy.w/2-2, y:enemy.y+enemy.h, vx:(dx/dist)*2.2, vy:(dy/dist)*2.2});
        if (wave >= 8) {
          enemyBullets.push({x:enemy.x+enemy.w/2-2, y:enemy.y+enemy.h, vx:(dx/dist)*2.2+1.2, vy:(dy/dist)*2.2});
          enemyBullets.push({x:enemy.x+enemy.w/2-2, y:enemy.y+enemy.h, vx:(dx/dist)*2.2-1.2, vy:(dy/dist)*2.2});
        }
        if (enemy.type === 'ddos' && enemy.timer % 3 === 0) {
          for (let a = 0; a < Math.PI*2; a += Math.PI/4) {
            enemyBullets.push({x:enemy.x+enemy.w/2, y:enemy.y+enemy.h/2, vx:Math.cos(a)*1.8, vy:Math.sin(a)*1.8});
          }
        }
      }
    }

    enemy.x += enemy.vx * spdMod; enemy.y += enemy.vy * spdMod;
    if (enemy.x < 0) { enemy.x = 0; enemy.vx *= -1; }
    if (enemy.x > GW-enemy.w) { enemy.x = GW-enemy.w; enemy.vx *= -1; }

    // Non-boss shooting
    if (enemy.pattern !== 'boss' && enemy.shootTimer <= 0 && enemy.y > 0) {
      enemy.shootTimer = 50 + Math.random()*70 - wave*2;
      enemyBullets.push({x:enemy.x+enemy.w/2-2, y:enemy.y+enemy.h, vx:0, vy:2.2});
    }

    // Bullet hit
    for (let i = bullets.length-1; i >= 0; i--) {
      const b = bullets[i];
      if (rr(b,8,16, enemy,enemy.w,enemy.h)) {
        bullets.splice(i, 1);
        enemy.hp--;
        sfxHit();
        spawnParticles(b.x, b.y, QB.tealLt, 3, 1.5);
        if (enemy.hp <= 0) {
          sfxExplosion();
          spawnExplosion(enemy.x+enemy.w/2, enemy.y+enemy.h/2, enemy.pattern==='boss'?3:1);
          score += enemy.score * (player.scoreMultiplier || 1);
          spawnFloatText(enemy.x, enemy.y, '+'+enemy.score, '#ffcc00');
          if (Math.random() < 0.18 || enemy.pattern === 'boss') spawnPowerup(enemy.x+enemy.w/2-8, enemy.y);
          if (enemy.pattern === 'boss') {
            state = STATES.PLAYING;
            shakeTimer = 30; shakeIntensity = 6;
            score += 5000;
            clientsSaved++;
            const client = CLIENTS[clientsSaved % CLIENTS.length];
            spawnFloatText(GW/2-40, GH/2-30, 'NETWORK SECURED!', QB.tealLt);
            spawnFloatText(GW/2-40, GH/2-10, client + ' PROTECTED', '#ffcc00');
          }
          return false;
        }
        return true;
      }
    }

    if (player.invincible <= 0 && rr(enemy,enemy.w,enemy.h, player,player.w,player.h)) {
      if (player.shieldActive) {
        player.shieldActive = false; enemy.hp -= 3;
        spawnParticles(player.x+11, player.y+11, QB.tealLt, 12);
        if (enemy.hp <= 0) { spawnExplosion(enemy.x+enemy.w/2,enemy.y+enemy.h/2); score+=enemy.score; return false; }
      } else { hitPlayer(); }
    }

    return enemy.y < GH + 30;
  });

  // Powerups
  powerups = powerups.filter(p => {
    p.y += p.vy; p.glow = (p.glow+0.1)%(Math.PI*2);
    if (rr(p,p.w,p.h, player,player.w,player.h)) {
      sfxPickup();
      if (p.type === 'managed') {
        player.shieldActive = true; player.shieldTimer = 360;
        spawnFloatText(p.x, p.y, SERVICE_NAMES.managed, QB.tealLt);
      } else if (p.type === 'professional') {
        player.powerLevel = Math.min(3, player.powerLevel+1);
        spawnFloatText(p.x, p.y, SERVICE_NAMES.professional, '#2288cc');
      } else if (p.type === 'acquisition') {
        player.fireRate = Math.max(4, player.fireRate-2);
        spawnFloatText(p.x, p.y, SERVICE_NAMES.acquisition, QB.tealLt);
      }
      score += 50;
      spawnParticles(p.x+8, p.y+8, QB.tealLt, 8, 2);
      return false;
    }
    return p.y < GH+20;
  });

  updateParticles();
  explosions = explosions.filter(e => { e.frame += 0.3; return e.frame < 8; });
  floatTexts = floatTexts.filter(f => { f.y -= 0.5; f.life--; return f.life > 0; });

  if (enemies.length === 0 && waveTimer <= 0 && state !== STATES.GAMEOVER) waveTimer = 100;
}

function hitPlayer() {
  player.lives--;
  player.invincible = 100;
  player.powerLevel = Math.max(1, player.powerLevel-1);
  player.fireRate = Math.min(11, player.fireRate+2);
  sfxExplosion();
  spawnExplosion(player.x+11, player.y+11, 2);
  shakeTimer = 15; shakeIntensity = 5;
  if (player.lives <= 0) {
    state = STATES.GAMEOVER;
    if (score > highScore) { highScore = score; localStorage.setItem('qb_hs2', highScore.toString()); }
  }
}

function updateBG() {
  stars.forEach(s => { s.y += s.speed; if (s.y > GH) { s.y = 0; s.x = Math.random()*GW; }});
  dataStreams.forEach(d => { d.y += d.speed; if (d.y > GH + d.length) { d.y = -d.length; d.x = Math.random()*GW; }});
  floatingPartners.forEach(p => { p.y += p.speed; if (p.y > GH + 10) { p.y = -10; p.x = Math.random()*GW; }});
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97; p.life--;
    return p.life > 0;
  });
}

function rr(a, aw, ah, b, bw, bh) {
  return a.x < b.x+bw && a.x+aw > b.x && a.y < b.y+bh && a.y+ah > b.y;
}

// ========================================================
// RENDERING
// ========================================================
function draw() {
  // Background — dark with brand blue-ish tint
  bctx.fillStyle = QB.dark;
  bctx.fillRect(0, 0, GW, GH);

  let sx = 0, sy = 0;
  if (shakeTimer > 0) {
    sx = (Math.random()-0.5)*shakeIntensity; sy = (Math.random()-0.5)*shakeIntensity;
    bctx.save(); bctx.translate(sx, sy);
  }

  // Grid (Quadbridge teal tint)
  bctx.strokeStyle = 'rgba(20, 121, 150, 0.06)';
  bctx.lineWidth = 1;
  for (let i = 0; i < GW; i += 48) { bctx.beginPath(); bctx.moveTo(i,0); bctx.lineTo(i,GH); bctx.stroke(); }
  gridLines.forEach(g => { g.y = (g.y + g.speed) % GH; bctx.beginPath(); bctx.moveTo(0,g.y); bctx.lineTo(GW,g.y); bctx.stroke(); });

  // Data streams
  dataStreams.forEach(d => {
    bctx.globalAlpha = d.alpha;
    const grad = bctx.createLinearGradient(d.x, d.y, d.x, d.y + d.length);
    grad.addColorStop(0, 'rgba(20,121,150,0)');
    grad.addColorStop(0.5, QB.teal);
    grad.addColorStop(1, 'rgba(20,121,150,0)');
    bctx.fillStyle = grad;
    bctx.fillRect(d.x, d.y, 1, d.length);
  });
  bctx.globalAlpha = 1;

  // Stars
  stars.forEach(s => {
    bctx.fillStyle = s.color;
    bctx.globalAlpha = 0.3 + Math.sin(frameCount*0.02 + s.x)*0.2;
    bctx.fillRect(Math.floor(s.x), Math.floor(s.y), s.size, s.size);
  });
  bctx.globalAlpha = 1;

  // Floating partner names
  floatingPartners.forEach(p => {
    bctx.globalAlpha = p.alpha;
    bctx.fillStyle = QB.teal;
    bctx.font = '6px monospace';
    bctx.fillText(p.name, Math.floor(p.x), Math.floor(p.y));
  });
  bctx.globalAlpha = 1;

  if (state === STATES.TITLE) drawTitle();
  else if (state === STATES.SELECT) drawSelect();
  else if (state === STATES.GAMEOVER) drawGameOver();
  else drawGameplay();

  if (shakeTimer > 0) bctx.restore();

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(buf, 0, 0, GW, GH, 0, 0, canvas.width, canvas.height);

  // CRT scanline overlay (subtle for clean look)
  ctx.fillStyle = 'rgba(0,0,0,0.025)';
  for (let y = 0; y < canvas.height; y += 4) {
    ctx.fillRect(0, y, canvas.width, 1);
  }

  // Vignette effect
  const vg = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.height*0.35,
    canvas.width/2, canvas.height/2, canvas.height*0.75
  );
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

  bctx.drawImage(proSprite, 0, 0, 22, 22, GW/2 - 132, ly + 8, 16, 16);
  bctx.fillText('PRO SERVICES — WEAPON UPGRADE', GW/2 - 110, ly + 19);
  bctx.drawImage(techSprite, 0, 0, 22, 22, GW/2 - 132, ly + 24, 16, 16);

  // High score
  if (highScore > 0) {

  bctx.fillStyle = '#223344';

}


function drawSelect() {
  const pulse = Math.sin(titlePulse) * 0.15 + 0.85;

  // Header
  bctx.font = 'bold 14px Montserrat, Arial, sans-serif';
  bctx.textAlign = 'center';
  bctx.fillStyle = QB.tealLt;
  bctx.fillText('SELECT YOUR DEFENDER', GW/2, 30);

  // Decorative line
  bctx.fillStyle = QB.teal;
  bctx.fillRect(GW/2 - 90, 38, 150, 2);
  bctx.fillStyle = QB.red;
  bctx.fillRect(GW/2 + 60, 38, 30, 2);

  // Draw all characters in a row
  const totalW = TEAM_DATA.length * 70;
  const startX = (GW - totalW) / 2;

  TEAM_DATA.forEach((char, i) => {
    const cx = startX + i * 70 + 35;
    const cy = 110;
    const isSelected = i === selectedChar;

    // Selection highlight
    if (isSelected) {
      bctx.fillStyle = `rgba(20, 121, 150, ${0.15 * pulse})`;
      bctx.fillRect(cx - 30, cy - 35, 60, 100);
      bctx.strokeStyle = QB.tealLt;
      bctx.lineWidth = 2;
      bctx.strokeRect(cx - 30, cy - 35, 60, 100);
      bctx.lineWidth = 1;

      // Arrow indicator
      if (Math.floor(frameCount / 15) % 2 === 0) {
        bctx.fillStyle = QB.tealLt;
        bctx.beginPath();
        bctx.moveTo(cx - 5, cy - 42);
        bctx.lineTo(cx + 5, cy - 42);
        bctx.lineTo(cx, cy - 48);
        bctx.fill();
      }
    }

    // Draw select sprite (source 96x96, display at 48x48 for smooth scaling)
    bctx.imageSmoothingEnabled = true; bctx.imageSmoothingQuality = 'high';
    try { bctx.drawImage(char.selectImg, cx - 24, cy - 24, 48, 48); } catch(e) {}
    bctx.imageSmoothingEnabled = false;

    // Name
    bctx.font = '6px monospace';
    bctx.fillStyle = isSelected ? QB.white : QB.gray;
    bctx.textAlign = 'center';
    bctx.fillText(char.name.split(' ')[0], cx, cy + 36);
    bctx.fillText(char.name.split(' ').slice(1).join(' '), cx, cy + 46);

    // Role
    if (isSelected) {
      bctx.font = '5px monospace';
      bctx.fillStyle = QB.tealDk;
      bctx.fillText(char.role, cx, cy + 56);
    }
  });

  // Selected character detail panel
  const sel = TEAM_DATA[selectedChar];

  // Panel background
  bctx.fillStyle = 'rgba(20, 121, 150, 0.08)';
  bctx.fillRect(GW/2 - 150, 200, 300, 100);
  bctx.strokeStyle = QB.tealDk;
  bctx.strokeRect(GW/2 - 150, 200, 300, 100);

  // Portrait (source 128x128, display at 64x64 for smooth scaling)
  bctx.imageSmoothingEnabled = true; bctx.imageSmoothingQuality = 'high';
  try { bctx.drawImage(sel.portraitImg, GW/2 - 140, 210, 64, 64); } catch(e) {}
  bctx.imageSmoothingEnabled = false;

  // Info text
  bctx.textAlign = 'left';
  bctx.font = 'bold 10px Montserrat, Arial, sans-serif';
  bctx.fillStyle = QB.white;
  bctx.fillText(sel.name, GW/2 - 65, 222);

  bctx.font = '7px monospace';
  bctx.fillStyle = QB.tealLt;
  bctx.fillText(sel.role, GW/2 - 65, 236);

  // Ability box
  bctx.fillStyle = 'rgba(226, 28, 45, 0.15)';
  bctx.fillRect(GW/2 - 65, 248, 200, 36);
  bctx.strokeStyle = QB.red;
  bctx.strokeRect(GW/2 - 65, 248, 200, 36);

  bctx.font = 'bold 8px monospace';
  bctx.fillStyle = '#ffcc00';
  bctx.fillText('ABILITY: ' + sel.ability.name, GW/2 - 58, 262);
  bctx.font = '7px monospace';
  bctx.fillStyle = QB.grayLt;
  bctx.fillText(sel.ability.desc, GW/2 - 58, 276);

  // Controls
  bctx.textAlign = 'center';
  bctx.font = '7px monospace';
  bctx.fillStyle = QB.gray;
  bctx.fillText('← →  SELECT DEFENDER', GW/2, 325);

  // Deploy button
  if (Math.floor(frameCount / 25) % 2 === 0) {
    bctx.fillStyle = QB.red;
    bctx.fillRect(GW/2 - 80, 340, 160, 22);
    bctx.fillStyle = QB.white;
    bctx.font = 'bold 8px monospace';
    bctx.fillText('SPACE / ENTER — DEPLOY', GW/2, 354);
  }

  bctx.textAlign = 'left';
}

function drawGameplay() {
  bctx.imageSmoothingEnabled = true;
  // Bullets
  bullets.forEach(b => bctx.drawImage(bulletSprite, Math.floor(b.x), Math.floor(b.y)));
  enemyBullets.forEach(b => bctx.drawImage(enemyBulletSprite, Math.floor(b.x), Math.floor(b.y)));

  // Powerups
  powerups.forEach(p => {
    const glow = Math.sin(p.glow)*2;
    bctx.globalAlpha = 0.25;
    bctx.fillStyle = QB.tealLt;
    bctx.fillRect(p.x-2+glow, p.y-2+glow, p.w+4-glow*2, p.h+4-glow*2);
    bctx.globalAlpha = 1;
    bctx.drawImage(p.sprite, Math.floor(p.x), Math.floor(p.y));
  });

  // Enemies
  enemies.forEach(e => {
    bctx.drawImage(e.sprite, Math.floor(e.x), Math.floor(e.y));
    if (e.pattern === 'boss') {
      // HP bar
      const barW = 70, barH = 5;
      const bx = e.x + e.w/2 - barW/2, by = e.y - 10;
      bctx.fillStyle = '#220000';
      bctx.fillRect(bx, by, barW, barH);
      bctx.fillStyle = QB.red;
      bctx.fillRect(bx, by, barW*(e.hp/e.maxHp), barH);
      bctx.strokeStyle = '#ff6666';
      bctx.strokeRect(bx, by, barW, barH);
      // Boss name label
      bctx.font = '6px monospace';
      bctx.textAlign = 'center';
      bctx.fillStyle = '#ff8888';
      bctx.fillText(BOSS_NAMES[e.type] || 'BOSS', e.x+e.w/2, by - 3);
      bctx.textAlign = 'left';
    }
  });

  // Player
  if (player.invincible <= 0 || Math.floor(frameCount/3)%2 === 0) {
    const tf = Math.floor(frameCount/4) % 3;
    bctx.drawImage(thrusterSprites[tf], Math.floor(player.x), Math.floor(player.y + player.h - 3));
    bctx.drawImage(playerSprite, Math.floor(player.x), Math.floor(player.y));
    if (player.shieldActive) {
      bctx.strokeStyle = player.shieldTimer < 60 && Math.floor(frameCount/4)%2===0
        ? `rgba(20,121,150,0.3)` : `rgba(20,121,150,0.7)`;
      bctx.lineWidth = 2;
      bctx.beginPath();
      bctx.arc(player.x+18, player.y+18, 24, 0, Math.PI*2);
      bctx.stroke();
      bctx.lineWidth = 1;
    }
  }

  // Particles (smooth circles)
  particles.forEach(p => {
    bctx.globalAlpha = p.life / p.maxLife;
    bctx.fillStyle = p.color;
    bctx.beginPath(); bctx.arc(p.x, p.y, p.size*0.7, 0, Math.PI*2); bctx.fill();
  });
  bctx.globalAlpha = 1;

  // Explosions (smooth radial gradient glow)
  explosions.forEach(e => {
    const r = e.frame*3*e.size, alpha = 1 - e.frame/8;
    if (r < 0.5) return;
    // Outer glow (gradient)
    bctx.globalAlpha = alpha * 0.4;
    const og = bctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r*1.8);
    og.addColorStop(0, '#ffaa44'); og.addColorStop(0.5, '#ff440088'); og.addColorStop(1, 'rgba(255,68,0,0)');
    bctx.fillStyle = og; bctx.beginPath(); bctx.arc(e.x,e.y,r*1.8,0,Math.PI*2); bctx.fill();
    // Main explosion
    bctx.globalAlpha = alpha;
    const mg = bctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
    mg.addColorStop(0, '#ffffff'); mg.addColorStop(0.2, '#ffee66'); mg.addColorStop(0.5, QB.red); mg.addColorStop(1, 'rgba(136,16,24,0)');
    bctx.fillStyle = mg; bctx.beginPath(); bctx.arc(e.x,e.y,r,0,Math.PI*2); bctx.fill();
  });
  bctx.globalAlpha = 1;

  // Float texts
  floatTexts.forEach(f => { bctx.globalAlpha = f.life/50; bctx.fillStyle = f.color; bctx.font = '8px monospace'; bctx.textAlign = 'center'; bctx.fillText(f.text, f.x, f.y); });
  bctx.globalAlpha = 1; bctx.textAlign = 'left';

  // Boss name announcement
  if (bossNameTimer > 0) {
    bctx.globalAlpha = Math.min(1, bossNameTimer/20);
    bctx.font = 'bold 14px monospace';
    bctx.textAlign = 'center';
    bctx.fillStyle = QB.red;
    bctx.fillText('⚠ ' + bossNameDisplay + ' ⚠', GW/2, GH/2 - 20);
    bctx.font = '8px monospace';
    bctx.fillStyle = '#ff8888';
    bctx.fillText('THREAT LEVEL: CRITICAL', GW/2, GH/2 - 5);
    bctx.globalAlpha = 1; bctx.textAlign = 'left';
  }

  drawHUD();
}

function drawHUD() {
  // Top bar background
  bctx.fillStyle = 'rgba(9, 21, 32, 0.7)';
  bctx.fillRect(0, 0, GW, 28);
  bctx.fillStyle = QB.teal;
  bctx.fillRect(0, 28, GW, 1);

  // Score
  bctx.font = '8px monospace';
  bctx.textAlign = 'left';
  bctx.fillStyle = QB.tealLt;
  bctx.fillText('SCORE', 8, 10);
  bctx.fillStyle = QB.white;
  bctx.font = 'bold 9px monospace';
  bctx.fillText(score.toString().padStart(8, '0'), 8, 22);

  // Wave (center)
  bctx.textAlign = 'center';
  bctx.fillStyle = QB.gray;
  bctx.font = '7px monospace';
  bctx.fillText('WAVE', GW/2, 10);
  bctx.fillStyle = QB.white;
  bctx.font = 'bold 10px monospace';
  bctx.fillText(wave.toString(), GW/2, 23);

  // Boss warning
  if (state === STATES.BOSS && Math.floor(frameCount/12)%2===0) {
    bctx.fillStyle = QB.red;
    bctx.font = '7px monospace';
    bctx.fillText('⚠ BREACH DETECTED', GW/2, 40);
  }

  // Wave incoming
  if (waveTimer > 0 && waveTimer < 90 && enemies.length === 0) {
    bctx.fillStyle = QB.tealLt;
    bctx.font = 'bold 12px monospace';
    bctx.fillText('WAVE ' + (wave+1) + ' INCOMING', GW/2, GH/2 - 10);
    bctx.font = '7px monospace';
    bctx.fillStyle = QB.gray;
    bctx.fillText('DEPLOYING QUADBRIDGE DEFENSES...', GW/2, GH/2 + 5);
  }

  // Lives (right side)
  bctx.textAlign = 'right';
  bctx.font = '8px monospace';
  bctx.fillStyle = QB.gray;
  bctx.fillText('UPTIME', GW - 8, 10);
  bctx.fillStyle = QB.red;
  let livesStr = '';
  for (let i = 0; i < player.lives; i++) livesStr += '♥ ';
  bctx.font = '10px monospace';
  bctx.fillText(livesStr, GW - 8, 23);

  // Bottom bar — power level + tagline
  bctx.fillStyle = 'rgba(9, 21, 32, 0.5)';
  bctx.fillRect(0, GH - 18, GW, 18);
  bctx.fillStyle = QB.teal;
  bctx.fillRect(0, GH - 18, GW, 1);

  // Character portrait in top-left
  const sel = TEAM_DATA[selectedChar];
  bctx.imageSmoothingEnabled = true; bctx.imageSmoothingQuality = 'high';
  try { bctx.drawImage(sel.gameImg, GW - 34, 4, 24, 24); } catch(e) {} // source 48x48, display 24x24
  bctx.imageSmoothingEnabled = false;

  bctx.textAlign = 'left';
  bctx.font = '6px monospace';
  bctx.fillStyle = QB.gray;
  bctx.fillText('SVC: ' + '■'.repeat(player.powerLevel) + '□'.repeat(3-player.powerLevel), 8, GH - 6);

  // Clients saved
  bctx.fillText('CLIENTS SECURED: ' + clientsSaved, 100, GH - 6);

  // Scrolling tagline
  bctx.textAlign = 'right';
  bctx.fillStyle = QB.tealDk;
  bctx.fillText('QUADBRIDGE // ' + TAGLINES[currentTagline], GW - 8, GH - 6);

  bctx.textAlign = 'left';
}

function drawGameOver() {
  // Office bg dimmed
  bctx.globalAlpha = 0.15;
  bctx.imageSmoothingEnabled = true;
  try { bctx.drawImage(officeBgImg, 0, 0, GW, GH); } catch(e) {}
  bctx.imageSmoothingEnabled = false;
  bctx.globalAlpha = 1;

  // Dark overlay
  bctx.fillStyle = 'rgba(9, 21, 32, 0.8)';
  bctx.fillRect(0, 0, GW, GH);

  bctx.textAlign = 'center';

  // Logo at top
  bctx.imageSmoothingEnabled = true;
  bctx.globalAlpha = 0.6;
  try { bctx.drawImage(qbLogoImg, GW/2 - 60, 20, 120, 75); } catch(e) {}
  bctx.globalAlpha = 1;
  bctx.imageSmoothingEnabled = false;

  // NETWORK BREACH
  bctx.font = 'bold 20px Montserrat, Arial, sans-serif';
  bctx.fillStyle = QB.red;
  bctx.shadowColor = QB.red;
  bctx.shadowBlur = 10;
  bctx.fillText('NETWORK BREACH', GW/2, 125);
  bctx.shadowBlur = 0;

  bctx.font = '8px monospace';
  bctx.fillStyle = QB.gray;
  bctx.fillText('THE NETWORK HAS BEEN COMPROMISED', GW/2, 145);

  // Stats panel
  bctx.fillStyle = 'rgba(20, 121, 150, 0.08)';
  bctx.fillRect(GW/2 - 120, 160, 240, 90);
  bctx.strokeStyle = QB.tealDk;
  bctx.strokeRect(GW/2 - 120, 160, 240, 90);

  bctx.font = '10px monospace';
  bctx.fillStyle = QB.tealLt;
  bctx.fillText('INCIDENT REPORT', GW/2, 178);

  bctx.font = '9px monospace';
  bctx.fillStyle = QB.white;
  bctx.fillText('THREATS NEUTRALIZED: ' + score, GW/2, 200);

  bctx.fillStyle = '#ffcc00';
  bctx.fillText('WAVES SURVIVED: ' + wave, GW/2, 218);

  bctx.fillStyle = QB.tealLt;
  bctx.fillText('CLIENTS SECURED: ' + clientsSaved, GW/2, 236);

  if (score > highScore) {
    bctx.font = 'bold 10px monospace';
    bctx.fillStyle = '#ffcc00';
    bctx.fillText('★ NEW HIGH SCORE ★', GW/2, 270);
  } else if (highScore > 0) {
    bctx.font = '8px monospace';
    bctx.fillStyle = QB.gray;
    bctx.fillText('BEST: ' + highScore, GW/2, 270);
  }

  // Restart
  if (Math.floor(frameCount/30) % 2 === 0) {
    bctx.fillStyle = QB.red;
    bctx.fillRect(GW/2 - 100, 290, 200, 22);
    bctx.fillStyle = QB.white;
    bctx.font = 'bold 8px monospace';
    bctx.fillText('PRESS SPACE TO REDEPLOY', GW/2, 305);
  }

  // Footer
  bctx.font = '5px monospace';
  bctx.fillStyle = '#334455';
  bctx.fillText('QUADBRIDGE: KEEP IT REAL', GW/2, 345);

  bctx.textAlign = 'left';
}

// 16-BIT CHIPTUNE MUSIC ENGINE

    ],

  // --- BOSS THEME: Intense, dark, menacing ---
  boss: {
    bpm: 165,
    lead: [
      'E5','-','E5','-','Eb5','-','Eb5','-',
      'D5','-','D5','-','Db5','-','C5','-',
      'B4','-','C5','-','D5','-','Eb5','-',
      'E5','-','-','-','E5','E5','E5','-',
      'A5','-','A5','-','Ab5','-','Ab5','-',
      'G5','-','G5','-','Gb5','-','E5','-',
      'Eb5','-','E5','-','G5','-','A5','-',
      'B5','-','-','-','A5','-','-','-',
    ],
    bass: [
      'E3','-','E3','E3','E3','-','E3','E3',
      'D3','-','D3','D3','Db3','-','C3','C3',
      'B3','-','B3','B3','Bb3','-','A3','A3',
      'Ab3','-','Ab3','-','G3','-','G3','-',
      'A3','-','A3','A3','A3','-','A3','A3',
      'G3','-','G3','G3','Gb3','-','E3','E3',
      'Eb3','-','Eb3','Eb3','E3','-','E3','E3',
      'B3','-','B3','-','A3','-','A3','-',
    ],
    arp: [
      'E4','B4','E4','B4','Eb4','Bb4','Eb4','Bb4',
      'D4','A4','D4','A4','C4','G4','C4','G4',
      'B3','Gb4','B3','Gb4','A3','E4','A3','E4',
      'Ab3','Eb4','Ab3','Eb4','G3','D4','G3','D4',
      'A3','E4','A3','E4','Ab3','Eb4','Ab3','Eb4',
      'G3','D4','G3','D4','E3','B3','E3','B3',
      'Eb3','Bb3','Eb3','Bb3','E3','B3','E3','B3',
      'B3','Gb4','B3','Gb4','A3','E4','A3','E4',
    ],
  },

  playNote(freq, duration, type, vol) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const f = audioCtx.createBiquadFilter();
    o.type = type;
    o.frequency.value = freq;
    // Slight detune for richness
    o.detune.value = (Math.random() - 0.5) * 6;
    // Low-pass filter for warmer 16-bit sound
    f.type = 'lowpass';
    f.frequency.value = type === 'sawtooth' ? 1200 : 2500;
    f.Q.value = 1;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration * 0.9);
    o.connect(f);
    f.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + duration);
    this.oscs.push({ o, g, stop: audioCtx.currentTime + duration });
  },

  // Drum sounds
  playKick() {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(150, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.12);
    g.gain.setValueAtTime(this.masterVol * 1.8, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
  },

  playHiHat() {
    if (!audioCtx) return;
    const bufSize = audioCtx.sampleRate * 0.03;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
    const n = audioCtx.createBufferSource();
    const g = audioCtx.createGain();
    const f = audioCtx.createBiquadFilter();
    n.buffer = buf;
    f.type = 'highpass'; f.frequency.value = 7000;
    g.gain.setValueAtTime(this.masterVol * 0.6, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
    n.connect(f); f.connect(g); g.connect(audioCtx.destination);
    n.start(); n.stop(audioCtx.currentTime + 0.04);
  },

  playSnare() {
    if (!audioCtx) return;
    // Noise burst
    const bufSize = audioCtx.sampleRate * 0.06;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
    const n = audioCtx.createBufferSource();
    const gn = audioCtx.createGain();
    const fn = audioCtx.createBiquadFilter();
    n.buffer = buf;
    fn.type = 'bandpass'; fn.frequency.value = 4000; fn.Q.value = 0.5;
    gn.gain.setValueAtTime(this.masterVol * 1.2, audioCtx.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
    n.connect(fn); fn.connect(gn); gn.connect(audioCtx.destination);
    n.start(); n.stop(audioCtx.currentTime + 0.08);
    // Tonal body
    const o = audioCtx.createOscillator();
    const go = audioCtx.createGain();
    o.type = 'triangle'; o.frequency.value = 180;
    go.gain.setValueAtTime(this.masterVol * 0.8, audioCtx.currentTime);
    go.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
    o.connect(go); go.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.06);
  },

  tick() {
    if (!this.playing || !this.currentTrack) return;
    const track = this[this.currentTrack];
    if (!track) return;
    const len = track.lead.length;
    const s = this.step % len;
    const stepDur = 60 / track.bpm / 2; // 16th notes

    // Lead (square wave)
    const leadNote = track.lead[s];
    if (leadNote && leadNote !== '-' && this.freq[leadNote]) {
      this.playNote(this.freq[leadNote], stepDur * 0.8, 'square', this.masterVol * 0.7);
    }

    // Bass (triangle wave for warm low end)
    const bassNote = track.bass[s];
    if (bassNote && bassNote !== '-' && this.freq[bassNote]) {
      this.playNote(this.freq[bassNote], stepDur * 0.9, 'triangle', this.masterVol * 1.0);
    }

    // Arpeggio (25% pulse via sawtooth)
    const arpNote = track.arp[s];
    if (arpNote && arpNote !== '-' && this.freq[arpNote]) {
      this.playNote(this.freq[arpNote], stepDur * 0.5, 'sawtooth', this.masterVol * 0.35);
    }

    // Drums
    if (s % 8 === 0) this.playKick();
    if (s % 8 === 4) this.playSnare();
    if (s % 2 === 0) this.playHiHat();
    if (this.currentTrack === 'boss' && s % 4 === 2) this.playKick(); // double-time kick for boss

    this.step++;
  },

  start(trackName) {
    if (this.currentTrack === trackName && this.playing) return;
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    this.stop();
    this.currentTrack = trackName;
    this.step = 0;
    this.playing = true;
    const track = this[trackName];
    const interval = (60 / track.bpm / 2) * 1000; // ms per 16th note
    this.timer = setInterval(() => this.tick(), interval);
  },

  stop() {
    this.playing = false;
    if (this.timer) { clearInterval(this.timer); this.timer = null; }
    this.currentTrack = null;
    // Clean up any lingering oscillators
    this.oscs = this.oscs.filter(o => {
      if (audioCtx && o.stop < audioCtx.currentTime) return false;
      return true;
    });
  },

  setVolume(v) {
    this.masterVol = Math.max(0, Math.min(0.06, v));
  }
};

// Integrate music with game state changes
const _origStartGame = startGame;
startGame = function() {
  _origStartGame();
  MUSIC.start('gameplay');
};

// ========================================================
// GAME LOOP (with music state management)
// ========================================================
let prevMusicState = null;
function gameLoop() {
  // Manage music based on game state
  if (audioCtx) {
    if (state === STATES.TITLE || state === STATES.SELECT) {
      if (prevMusicState !== 'title') { MUSIC.start('title'); prevMusicState = 'title'; }
    } else if (state === STATES.BOSS) {
      if (prevMusicState !== 'boss') { MUSIC.start('boss'); prevMusicState = 'boss'; }
    } else if (state === STATES.PLAYING) {
      if (prevMusicState !== 'gameplay') { MUSIC.start('gameplay'); prevMusicState = 'gameplay'; }
    } else if (state === STATES.GAMEOVER) {
      if (prevMusicState !== 'gameover') { MUSIC.stop(); prevMusicState = 'gameover'; }
    }
  }
  update(); draw(); requestAnimationFrame(gameLoop);
}
gameLoop();
